    scope_name: "TED"
    source_family: ted
    adapter: ted_api
    url: "https://api.ted.europa.eu/v3/notices/search"
    body:
      query: "buyer-country = GRC AND publication-date >= 20260701"
      fields:
        - publication-number
        - notice-title
        - buyer-name
        - publication-date
        - deadline-receipt-tender-date-lot
        - place-of-performance-subdiv-proc
        - links
      page: 1
      limit: 20
      scope: "ACTIVE"
      checkQuerySyntax: false
      paginationMode: "PAGE_NUMBER"

rules:
  - "Do not filter only by authority headquarters."
  - "Use NUTS, execution place, title, tender documents, technical description and aliases."
  - "Record source URL and retrieval timestamp for every datum."
  - "Do not declare complete coverage when a priority source fails."
  - "Treat PROC, AWRD and SYMV as distinct record types."
